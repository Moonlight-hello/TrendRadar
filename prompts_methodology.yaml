# ═══════════════════════════════════════════════════════════
#           基于知识沉淀方法论的递进式Prompt体系
# ═══════════════════════════════════════════════════════════
#
# 设计思路：
# 1. 对应方法论的三个阶段：宏观(1周) → 中观(2周) → 微观(长期)
# 2. 每个阶段有明确的数据需求和分析目标
# 3. Prompt包含数据验证要求，确保结论有数据支撑
#
# ═══════════════════════════════════════════════════════════

prompts:
  # ═══════════════════════════════════════════════════════════
  # 阶段1：宏观认知（5% → 能聊10-20分钟）
  # 对应方法论：1周快速了解行业基本面
  # ═══════════════════════════════════════════════════════════

  stage1_industry_overview:
    name: "行业宏观认知 - 第一阶段"
    goal: "5天内掌握行业全貌，能够进行10-20分钟专业对话"

    template: |
      你是一位资深的{industry}行业分析师。请基于以下数据和新闻，完成行业宏观认知分析。

      # 📊 数据输入
      {data_section}

      # 📰 新闻输入
      {news_section}

      # 🎯 分析要求

      请按照以下框架进行分析（要求：每个结论必须引用具体数据支撑）：

      ## 1. 行业盈利模式（10%）
      - 这个行业靠什么赚钱？
      - 主要收入来源是什么？
      - 利润率水平如何？（提供具体数据：XX%）
      - **数据要求**：必须包含行业平均利润率、龙头企业利润率对比

      ## 2. 产业链结构（20%）
      - 上游：原料是什么？来自哪里？占成本多少？
      - 中游：主要生产环节有哪些？
      - 下游：产品主要应用在哪些领域？各占多少？
      - **数据要求**：
        - 上游原料成本占比（如：电解铝中，电力XX%，氧化铝XX%）
        - 下游应用占比（如：建筑XX%，交通XX%，电力XX%）

      ## 3. 主要玩家（15%）
      - 国内外龙头企业是谁？（TOP 5）
      - 市场集中度如何？（CR5 = XX%）
      - 各家核心竞争力是什么？
      - **数据要求**：必须包含具体的产能、市占率数据

      ## 4. 上下游关系（20%）
      - 谁有定价权？（上游/中游/下游）
      - 行业受什么因素影响最大？
      - 产业链利润分配如何？
      - **数据要求**：价格传导机制（如：铝土矿价格上涨10%，氧化铝涨X%，电解铝涨X%）

      ## 5. 法律监管（5%）
      - 主要监管政策有哪些？
      - 准入门槛是什么？
      - 环保要求如何影响行业？

      ## 6. 关键数据速查表（30%）
      请制作一张"行业关键数据速查表"，包含：

      | 指标 | 最新值 | 同比 | 历史均值 | 数据来源 |
      |------|--------|------|----------|----------|
      | 全国产量 | XX万吨/月 | +X% | XX万吨 | 国家统计局 |
      | 表观消费量 | XX万吨/月 | +X% | XX万吨 | 行业协会 |
      | 库存水平 | XX万吨 | -X% | XX万吨 | 交易所 |
      | 价格（现货） | XX元/吨 | +X% | XX元 | SMM |
      | 进口量 | XX万吨 | +X% | XX万吨 | 海关总署 |
      | 出口量 | XX万吨 | -X% | XX万吨 | 海关总署 |

      **重要**：如果数据缺失，明确标注"数据待补充"，并说明需要从哪里获取。

      # 📝 输出格式

      - 总字数：1500-2000字
      - 必须包含数据速查表
      - 每个结论后标注数据来源
      - 最后总结"3个核心认知"（类似电梯演讲，30秒说清这个行业）

    required_data:
      - category: "production"
        description: "产量数据（最近12个月）"
      - category: "price"
        description: "价格数据（现货+期货，最近12个月）"
      - category: "inventory"
        description: "库存数据（交易所+社会库存）"
      - category: "macro"
        description: "宏观数据（PMI、固投等）"

  # ═══════════════════════════════════════════════════════════
  # 阶段2：公司研究（10-20% → 能聊30-60分钟）
  # 对应方法论：2周深入公司层面
  # ═══════════════════════════════════════════════════════════

  stage2_company_analysis:
    name: "公司研究 - 第二阶段"
    goal: "2周内深入理解龙头公司，形成投资判断"

    template: |
      你是一位专注于{industry}行业的投资分析师。请对{company}进行深度研究。

      # 📊 数据输入
      {data_section}

      # 📰 新闻输入
      {news_section}

      # 🎯 分析要求

      ## 1. 公司历史与战略（15%）
      - 公司发展历程（关键节点）
      - 当前战略定位是什么？
      - 与行业平均水平对比如何？

      ## 2. 成本结构拆解（30% - 核心）
      请制作详细的成本拆解表：

      **以电解铝为例**：
      | 成本项 | 占比 | 单位消耗 | 价格 | 金额 | 备注 |
      |--------|------|----------|------|------|------|
      | 电力 | 45% | 13,500度/吨铝 | 0.35元/度 | 4,725元 | 最大成本项 |
      | 氧化铝 | 35% | 1.93吨/吨铝 | 2,400元/吨 | 4,632元 | 原料成本 |
      | 阳极 | 8% | 0.55吨/吨铝 | 1,900元/吨 | 1,045元 | 消耗品 |
      | 人工 | 5% | - | - | 660元 | 固定成本 |
      | 折旧 | 7% | - | - | 924元 | 固定成本 |
      | 其他 | 5% | - | - | 660元 | 杂项 |
      | **合计** | **100%** | - | - | **12,646元** | 完全成本 |

      **数据要求**：
      - 必须标注数据来源（如：公司年报、行业报告）
      - 如果数据缺失，说明如何估算（如：参考行业平均水平）

      ## 3. 利润率分析（20%）
      - 毛利率：XX%（行业平均：XX%）
      - 净利率：XX%（行业平均：XX%）
      - ROE：XX%（杜邦分析：净利率 × 周转率 × 杠杆率）
      - 盈利驱动因素：价差（销售价 - 成本）如何变化？

      ## 4. 收入预测模型（20%）
      建立简单的收入预测模型：

      ```
      营收 = 产能 × 产能利用率 × 价格

      2024年：300万吨 × 85% × 15,000元 = 382.5亿
      2025年预测：330万吨 × 90% × 16,000元 = 475.2亿（+24%）

      假设：
      - 产能扩张：+10%（新建产能投产）
      - 利用率提升：+5%（需求回暖）
      - 价格上涨：+6.7%（供给偏紧）
      ```

      **数据要求**：说明每个假设的依据（如：价格上涨基于供需平衡分析）

      ## 5. 投资价值判断（15%）
      - 估值水平：PE = XX（行业中位数：XX）
      - 安全边际：当前价格 vs 合理价值
      - 核心风险：最大的3个风险是什么？
      - 投资建议：买入/持有/卖出（给出具体理由）

      # 📝 输出格式

      - 总字数：2500-3000字
      - 必须包含成本拆解表和收入预测模型
      - 核心数据需标注来源
      - 最后给出"30秒投资摘要"

    required_data:
      - category: "company_financials"
        description: "公司财务数据（最近3年）"
      - category: "production"
        description: "产量和产能数据"
      - category: "price"
        description: "产品价格和原料价格"
      - category: "cost_structure"
        description: "成本结构数据（如可获取）"

  # ═══════════════════════════════════════════════════════════
  # 阶段3：微观动态（持续深化 → 形成专业判断力）
  # 对应方法论：长期跟踪，建立数据敏感性
  # ═══════════════════════════════════════════════════════════

  stage3_micro_tracking:
    name: "微观动态跟踪 - 第三阶段"
    goal: "持续跟踪细微变化，建立数据敏感性"

    template: |
      你是{industry}行业的高级分析师，正在进行日常跟踪分析。

      # 📊 数据输入（最近7天）
      {data_section}

      # 📰 新闻输入（最近7天）
      {news_section}

      # 🎯 分析要求

      ## 1. 变化识别（20%）
      对比历史数据，识别以下变化：

      | 指标 | 最新值 | 7天前 | 变化 | 历史分位 | 异常？ |
      |------|--------|-------|------|----------|--------|
      | 现货价格 | 15,200 | 15,000 | +1.3% | 75分位 | 否 |
      | 库存 | 85万吨 | 92万吨 | -7.6% | 30分位 | ⚠️ 是 |
      | 进口量 | 45万吨 | 38万吨 | +18% | 90分位 | ⚠️ 是 |

      **标准**：
      - 价格变化 >3% 或 <5分位/> 95分位 → 异常
      - 库存变化 >10% 或 <20分位/> 80分位 → 异常
      - 进口/出口变化 >15% → 异常

      ## 2. 异常深挖（30%）
      针对标记为"异常"的指标，深入分析：

      **示例：库存异常下降7.6%**

      可能原因：
      1. 需求端：下游开工率上升？（查：家电、汽车产量数据）
      2. 供给端：冶炼厂检修？（查：最近新闻）
      3. 季节性：历史上该时段库存变化？
      4. 投机性：是否囤货？（查：现货升水、期货持仓）

      **数据验证**：
      - 家电产量：+5.2%（验证需求上升✓）
      - 冶炼厂检修：无重大检修（排除供给收缩✗）
      - 历史同期：往年此时库存平均下降3%（今年下降7.6%超预期✓）
      - 现货升水：+150元/吨（扩大）（暗示现货紧张✓）

      **结论**：库存异常下降主要由需求超预期驱动，同时现货紧张加剧，短期价格有支撑。

      ## 3. 产业链联动（25%）
      分析上下游数据的联动关系：

      **示例：电解铝产业链**

      ```
      铝土矿（上游） → 氧化铝（中游1） → 电解铝（中游2） → 铝材加工（下游）

      最新数据：
      - 铝土矿进口：+12%（几内亚、澳洲）
      - 氧化铝价格：-2%（产能过剩）
      - 电解铝产量：+3%（开工率回升）
      - 铝材加工订单：+8%（需求回暖）

      逻辑链：
      1. 铝土矿进口增加 → 氧化铝供给充足 → 价格下跌
      2. 氧化铝价格下跌 → 电解铝成本下降 → 利润扩大 → 开工率提升
      3. 下游订单增加 → 铝材需求拉动 → 电解铝去库存加速

      **矛盾点**：氧化铝过剩但电解铝紧张？
      → 查：电解铝是否受限（政策、电力供应）
      ```

      ## 4. 前瞻性判断（25%）
      基于当前数据，预测未来2-4周可能的变化：

      **如果X，那么Y**：
      - 如果：下游需求持续强劲（家电+汽车+建筑都在扩张）
        那么：库存将继续下降至70万吨（20分位以下），价格上涨至15,800

      - 如果：进口量维持高位（45万吨/月）
        那么：2个月后供给压力显现，价格回调至14,800

      **需要关注的领先指标**：
      1. PMI新订单指数（领先1个月）
      2. 地产新开工（领先2-3个月）
      3. 交易所持仓变化（领先1-2周）

      # 📝 输出格式

      - 总字数：1500-2000字
      - 重点：异常识别+深度验证
      - 必须有数据交叉验证逻辑
      - 最后给出"下周关注重点"（3-5个具体指标）

    required_data:
      - category: "price"
        description: "最近7天价格数据（对比历史分布）"
      - category: "inventory"
        description: "最近7天库存数据"
      - category: "production"
        description: "最近月度产量数据"
      - category: "downstream"
        description: "下游行业数据（家电、汽车、建筑等）"

  # ═══════════════════════════════════════════════════════════
  # 专项Prompt：成本拆解（针对原料密集型行业）
  # ═══════════════════════════════════════════════════════════

  special_cost_breakdown:
    name: "成本结构深度拆解"
    goal: "回答：多少电？多少铝？多少成本？"

    template: |
      你是{industry}行业的成本工程师。请对{product}进行成本结构深度拆解。

      # 🎯 核心问题

      生产1吨{product}需要：
      - 多少电力？（度）
      - 多少原料？（吨）
      - 多少人工？（工时）
      - 总成本是多少？（元）

      # 📊 数据要求

      ## 1. 物料平衡表（Material Balance）

      | 投入 | 数量 | 单位 | 单价 | 金额 | 占比 |
      |------|------|------|------|------|------|
      | 电力 | 13,500 | 度/吨 | 0.35元/度 | 4,725元 | 37.4% |
      | 氧化铝 | 1.93 | 吨/吨 | 2,400元/吨 | 4,632元 | 36.6% |
      | 预焙阳极 | 0.55 | 吨/吨 | 1,900元/吨 | 1,045元 | 8.3% |
      | 冰晶石 | 0.02 | 吨/吨 | 8,000元/吨 | 160元 | 1.3% |
      | 氟化铝 | 0.03 | 吨/吨 | 12,000元/吨 | 360元 | 2.8% |
      | 人工 | - | - | - | 660元 | 5.2% |
      | 折旧 | - | - | - | 924元 | 7.3% |
      | 其他 | - | - | - | 140元 | 1.1% |
      | **总计** | - | - | - | **12,646元** | **100%** |

      **数据来源**：
      - 物料消耗：行业标准（GB/T XXXXX）或企业披露
      - 价格：最近一个月平均价格（来源：XXX）

      ## 2. 敏感性分析

      计算当成本项变化10%时，总成本的变化：

      | 成本项 | 弹性系数 | 变化10% → 总成本变化 |
      |--------|----------|---------------------|
      | 电力 | 3.74 | ±3.74% |
      | 氧化铝 | 3.66 | ±3.66% |
      | 阳极 | 0.83 | ±0.83% |

      **结论**：电力和氧化铝是最敏感的成本项，合计占74%。

      ## 3. 区域差异对比

      不同地区由于电价差异，成本差异显著：

      | 地区 | 电价 | 电力成本 | 总成本 | 优势 |
      |------|------|----------|--------|------|
      | 新疆 | 0.28元/度 | 3,780元 | 11,701元 | 基准 |
      | 内蒙古 | 0.30元/度 | 4,050元 | 11,971元 | +2.3% |
      | 山东 | 0.45元/度 | 6,075元 | 13,996元 | +19.6% |

      **结论**：电价0.1元/度的差异 → 总成本差异7.5%（945元/吨）

      ## 4. 盈亏平衡分析

      当前价格：15,200元/吨
      当前成本：12,646元/吨
      毛利：2,554元/吨（16.8%）

      **盈亏平衡价格**：12,646 + 增值税 + 三费 = 约13,500元/吨

      **结论**：只要价格 >13,500元/吨，企业就能盈利。当前价格15,200元，有1,700元/吨的安全边际。

      # 📝 输出格式

      - 必须包含完整的物料平衡表
      - 每个数字必须标注来源或估算方法
      - 最后总结"3个关键发现"

    required_data:
      - category: "cost_structure"
        description: "成本结构数据（公司年报或行业报告）"
      - category: "price"
        description: "原料和产品价格"
      - category: "regional_data"
        description: "不同地区的电价等成本差异"

# ═══════════════════════════════════════════════════════════
# Prompt使用指南
# ═══════════════════════════════════════════════════════════

usage_guide:
  stage1:
    when: "第一次接触该行业，或需要快速建立认知"
    duration: "5-7天"
    output: "能进行10-20分钟专业对话"
    data_requirement: "基础数据（价格、产量、库存、宏观）"

  stage2:
    when: "已有行业认知，需要深入公司层面"
    duration: "2-3周"
    output: "能形成投资判断，撰写30分钟路演"
    data_requirement: "公司财务数据 + 行业数据"

  stage3:
    when: "持续跟踪，建立数据敏感性"
    duration: "每周/每日"
    output: "快速捕捉异常，形成交易信号"
    data_requirement: "高频数据（日度/周度）+ 产业链数据"

  special:
    when: "需要回答具体问题（如：多少电？多少铝？）"
    duration: "单次分析"
    output: "精确的成本拆解和敏感性分析"
    data_requirement: "详细的成本结构数据"

