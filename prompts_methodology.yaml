  price:
    akshare: ["futures_main_sina"]  # 期货价格
    external: ["SMM现货价格", "Mysteel价格"]

  inventory:
    akshare: ["get_shfe_warehouse", "get_dce_warehouse"]
    source: "交易所仓单"

  macro:
    akshare: ["macro_china_pmi", "macro_china_fixed_asset_investment"]
    source: "统计局"

  cost_structure:
    source: "公司年报、券商研报、Wind数据库"
    note: "需要人工整理或付费数据源"

  downstream:
    akshare: ["macro_china_auto_production", "macro_china_real_estate"]
    source: "汽车协会、地产数据"

